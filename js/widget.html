<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>租必達專屬 AI 助理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <style>
    /* ===== ZUBIDA 品牌配色與基礎樣式大修 ===== */
    :root {
      --brand: #295b9a;        /* 租必達專業藍 */
      --brand-accent: #f48e3e; /* 租必達亮眼橙 */
      --brand-hover: #1e4577;  /* 藍色懸停深 */
      --brand-dim: #5c85ba;    /* 淡藍背景 */
      
      --ink: #2c3e50;         /* 文字黑 */
      --ink-sub: #7f8c8d;     /* 副標灰 */
      --ink-on-brand: #ffffff;
      
      --surface: #ffffff;     /* 卡片白 */
      --bg: #f4f6f8;          /* 底色灰 */
      --input-bg: #e4e9ef;    /* 輸入框灰 */
      
      --shadow: 0 12px 36px rgba(0,0,0,.15);
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }
    
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      background: transparent;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    
    #stage { position: relative; width: 100%; height: 100%; background: transparent; }

    /* ===== 控制列（下方操作區）大修 ===== */
    #control-bar {
      position: absolute; left: 0; bottom: 0; width: 100%;
      padding: 10px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      transition: opacity .3s var(--ease), transform .3s var(--ease);
      z-index: 10;
    }
    
    .dock-row {
      display: flex; gap: 8px; align-items: center; justify-content: flex-end;
      width: 100%; margin-top: 8px; pointer-events: auto;
    }
    
    /* 大修：隱藏不必要的按鈕 (大腦與角色切換) */
    #btn-llm, #btn-engine, .dock-row:first-child .ctrl.primary { display: none !important; }
    
    /* 大修：讓送出按鈕 (➤) 恢復顯示在打字框右邊 */
    .dock-row:first-child .ctrl.primary#btn-send { display: flex !important; }

    /* 大修：調整打字輸入框 */
    #type-input {
      flex: 1; min-width: 0; height: 38px;
      padding: 0 14px; border: 1px solid rgba(255,255,255,.2); border-radius: 999px;
      background: rgba(0,0,0,.6); color: #fff; font-size: 14px;
      outline: none; transition: background .15s;
    }
    #type-input::placeholder { color: rgba(255,255,255,.6); }
    #type-input:focus { border-color: rgba(255,255,255,.4); background: rgba(0,0,0,.7); }

    /*按鈕基礎樣式大修 */
    .ctrl {
      appearance: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px; padding: 0;
      border: 1px solid rgba(255,255,255,.2); border-radius: 999px;
      background: rgba(0,0,0,.6); color: #fff; font-size: 17px;
      transition: background .15s, transform .1s var(--ease), box-shadow .15s;
    }
    .ctrl:hover { background: rgba(0,0,0,.75); border-color: rgba(255,255,255,.3); }
    .ctrl:active { transform: scale(.96); }
    
    /* 特大主要按鈕（🎤） */
    .ctrl.primary { background: var(--brand); font-weight: 600; border: none; font-size: 14px; gap: 4px; padding: 0 16px; width: auto; height: 38px;}
    .ctrl.primary:hover { background: var(--brand-hover); }
    
    /* 大修：✕ 按鈕改為醒目的租必達橙色 */
    #btn-close {
      border: 2px solid #fff;
      box-shadow: 0 3px 10px rgba(0,0,0,.25);
      background: var(--brand-accent); color: #fff;
    }
    #btn-close:hover { background: #e07d32; }

    /* 大修：隱藏不需使用的按鈕的狀態標示 (Mute, Speed) */
    .ctrl.active { background: var(--brand-dim); color: #fff; border-color: var(--brand-dim); }

    /* ===== 對話泡泡樣式大修 ===== */
    #bubble {
      position: absolute; right: 14px; top: 14px; left: 14px;
      background: var(--surface); color: var(--ink); border-radius: 16px;
      padding: 11px 14px; font-size: 14px; line-height: 1.55;
      box-shadow: 0 10px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(0,0,0,.05);
      opacity: 0; transform: translateY(-8px) scale(.98); transform-origin: top center;
      transition: opacity .22s var(--ease), transform .22s var(--ease);
      pointer-events: none;
    }
    #bubble::after { /* 泡泡小尾巴 */
      content: ""; position: absolute; right: 38px; bottom: -7px;
      width: 14px; height: 14px; background: var(--surface); transform: rotate(45deg);
    }
    #bubble.show { opacity: 1; transform: none; }

    /* ===== 大修：專屬租賃提示清單 ===== */
    #suggestions {
      position: absolute; left: 10px; right: 10px; bottom: 104px;
      display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
      pointer-events: auto;
    }
    #suggestions .sg-label { /* 「我能為您解答：」 */
      width: 100%; text-align: center; font-size: 12px; font-weight: 600;
      color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5);
      margin-bottom: 2px;
    }
    .sugg {
      appearance: none; cursor: pointer; white-space: nowrap;
      background: rgba(255,255,255,.95); color: var(--brand);
      border: 1px solid rgba(0,0,0,.1); border-radius: 999px;
      font-size: 12px; font-weight: 600; padding: 6px 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,.16);
      transition: transform .12s var(--ease), background .15s;
    }
    .sugg:hover { background: #fff; transform: translateY(-1px); }
    .sugg:active { transform: scale(.96); }

    /* 手機版適配 */
    @media (pointer: coarse) {
      .dock-row { gap: 6px; }
      #type-input, .ctrl, .sugg { height: 38px; font-size: 14px; }
      .ctrl.primary { font-size: 14px; padding: 0 14px; height: 38px; }
      .sugg { padding: 6px 12px; height: 32px; font-size: 12px;}
    }

    /* 無反應警告提示 */
    #direct-warn { position: absolute; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.85); color: #fff; font-size: 15px; text-align: center; padding: 24px; }
  </style>
</head>
<body>
  <div id="stage">
    <div id="bubble"></div>
    
    <div id="suggestions"></div>
    
    <div id="control-bar">
      <div class="dock-row">
        <input id="type-input" type="text" maxlength="200" placeholder="詢問租賃設備，我為您規劃..." aria-label="輸入設備諮詢" />
        <button class="ctrl primary" id="btn-send" aria-label="送出問題">
          <span aria-hidden="true">➤</span>
        </button>
      </div>
      
      <div class="dock-row" role="toolbar" aria-label="設備助理控制列">
        <button class="ctrl primary" id="btn-mic" aria-label="開始語音諮詢">
          <span aria-hidden="true">🎤</span> 點我對話
        </button>
        <button class="ctrl" id="btn-engine" style="display:none">2D／3D</button>
        <button class="ctrl" id="btn-llm" style="display:none">🧠</button>
        <button class="ctrl" id="btn-mute" style="display:none">🔊</button>
        <button class="ctrl" id="btn-speed" style="display:none">1.0×</button>
        <button class="ctrl" id="btn-close" aria-label="收起助理">
          <span aria-hidden="true">✕</span>
        </button>
      </div>
    </div>
  </div>
  
  <div id="direct-warn">請透過 <code>embed.js</code> 載入此元件。</div>

  <script>
    /* ===================================================================== *
     * widget.html 底層邏輯大修
     * ===================================================================== */
    (function(){
      let ui, speech;
      
      // ===== DOM 元素大修 =====
      const els = {
        stage: document.getElementById('stage'),
        controlBar: document.getElementById('control-bar'),
        typeInput: document.getElementById('type-input'),
        btnSend: document.getElementById('btn-send'),
        btnMic: document.getElementById('btn-mic'),
        btnClose: document.getElementById('btn-close'),
        bubble: document.getElementById('bubble'),
        suggestions: document.getElementById('suggestions'),
      };
      
      // ===== 大修：核心開關 (隱藏功能) =====
      const config = {
        use_kb: true,          // 啟用知識庫
        use_llm: false,        // 大修：禁用 LLM 大腦模式
        use_speech: false,     // 大修：禁用 TTS (因需付費且預設用瀏覽器原生)
      };

      // ===== 大修：租賃專屬劇本初始化 =====
      // ===== 這裡的 defaultSuggestions 和 this.say 將被用作 ZUBIDA 劇本 =====
      class ZubidaWidget {
        constructor() {
          this.boot();
          this.kb = window.KB || []; // 取得知識庫
        }

        boot() {
          this.initSuggestions();
          this.initListeners();
          
          // 大修：打招呼台詞換成你的指定台詞！
          this.say("按右下角 ✕ 即可暫時把我隱藏，有需要再點我唷！");
        }

        // 大修：換成租必達的專屬快速問答劇本
        initSuggestions() {
          const defaultSuggestions = ["請問租金怎麼算？", "有出租哪些設備？", "水冷扇適合用在什麼地方？", "發電機型號怎麼挑？", "可以自載自搭嗎？"];
          
          els.suggestions.innerHTML = '<div class="sg-label">👋 💬 我能為您解答：</div>' + 
            defaultSuggestions.map(s => `<button class="sugg">${s}</button>`).join('');
            
          // 快速按鈕點擊監聽
          els.suggestions.addEventListener('click', (e) => {
            const btn = e.target.closest('.sugg');
            if(btn) {
              const q = btn.innerText;
              els.bubble.innerText = q;
              els.bubble.classList.add('show');
              els.controlBar.style.transform = 'translateY(110px)';
              window.postMessage({ type: 'ask_text', text: q }, '*'); // 送出問題
            }
          });
        }

        // 監聽器與打字送出
        initListeners() {
          // ✕ 按鈕
          els.btnClose.addEventListener('click', () => {
            window.parent.postMessage({ type: 'hide_widget' }, '*'); // 收起視窗
          });

          // 打字送出
          const send = () => {
            const q = els.typeInput.value.trim();
            if(q) {
              els.typeInput.value = '';
              els.bubble.innerText = q;
              els.bubble.classList.add('show');
              window.postMessage({ type: 'ask_text', text: q }, '*'); // 送出問題
            }
          };
          els.btnSend.addEventListener('click', send);
          els.typeInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') send(); });
        }

        say(text) {
          els.bubble.innerText = text;
          els.bubble.classList.add('show');
          
          // 5秒後收起泡泡和控制列
          clearTimeout(this.bubbleT);
          clearTimeout(this.ctrlBarT);
          this.bubbleT = setTimeout(() => els.bubble.classList.remove('show'), 5000);
          this.ctrlBarT = setTimeout(() => els.controlBar.style.transform = 'translateY(110px)', 5000); // 收起控制列
        }
      }

      // ===== 收聽訊息並與網頁連線 =====
      // 如果 3 秒後沒收到 embed.js 訊息，顯示警告
      const directWarn = setTimeout(() => document.getElementById('direct-warn').style.display = 'flex', 3000);
      
      window.addEventListener('message', (event) => {
        const msg = event.data;
        if(msg.type === 'init_widget') {
          clearTimeout(directWarn);
          ui = new ZubidaWidget();
        } else if(msg.type === 'say_text') { // 從知識庫吐出來的答案
          ui.say(msg.text);
        }
      });
      
    })();
  </script>
</body>
</html>
