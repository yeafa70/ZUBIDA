<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>租必達 AI 助理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --brand: #1e3a8a;
      --brand-2: #3b82f6;
      --accent: #f59e0b;
      --accent-2: #f97316;
      --ink: #0f172a;
      --muted: #64748b;
      --surface: #ffffff;
      --soft: #eff6ff;
      --border: rgba(148,163,184,.35);
      --shadow: 0 14px 38px rgba(15,23,42,.22);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
    }
    #widget {
      width: 100%;
      height: 100%;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(59,130,246,.16), transparent 28%),
        linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white;
      padding: 12px 12px 14px;
      position: relative;
    }
    .brand-row { display: flex; align-items: center; gap: 10px; padding-right: 42px; }
    .avatar-mark {
      width: 42px; height: 42px; border-radius: 16px;
      background: rgba(255,255,255,.16);
      display: grid; place-items: center;
      border: 1px solid rgba(255,255,255,.22);
      font-size: 22px; box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
      flex: 0 0 auto;
    }
    .brand-title { font-size: 17px; font-weight: 900; line-height: 1.1; letter-spacing: .02em; }
    .brand-sub { margin-top: 4px; font-size: 12px; opacity: .88; line-height: 1.35; }
    #btn-close {
      position: absolute; right: 10px; top: 10px;
      width: 34px; height: 34px;
      border: 2px solid rgba(255,255,255,.75); border-radius: 999px;
      background: var(--accent-2); color: #fff; cursor: pointer;
      font-size: 18px; font-weight: 900; line-height: 1;
      box-shadow: 0 4px 12px rgba(15,23,42,.25);
    }
    #btn-close:hover { filter: brightness(.96); }
    .chat {
      flex: 1 1 auto; padding: 12px; overflow: auto;
      display: flex; flex-direction: column; gap: 9px; min-height: 0;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 92%; border-radius: 16px; padding: 10px 12px;
      font-size: 14px; line-height: 1.55; word-break: break-word; white-space: pre-wrap;
    }
    .msg.bot {
      align-self: flex-start; background: white; border: 1px solid var(--border);
      box-shadow: 0 4px 14px rgba(15,23,42,.06);
    }
    .msg.user {
      align-self: flex-end; background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: white; box-shadow: 0 6px 16px rgba(30,58,138,.2);
    }
    .suggestions { padding: 0 12px 10px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .sg-label { width: 100%; font-size: 12px; color: var(--muted); font-weight: 800; text-align: center; margin-bottom: 2px; }
    .sugg {
      appearance: none; border: 1px solid rgba(30,58,138,.18); background: white; color: var(--brand);
      border-radius: 999px; padding: 7px 10px; font-size: 12px; font-weight: 800; cursor: pointer;
      box-shadow: 0 3px 10px rgba(15,23,42,.06);
    }
    .sugg:hover { background: var(--soft); }
    .inputbar {
      flex: 0 0 auto; display: flex; gap: 7px; padding: 10px;
      border-top: 1px solid rgba(148,163,184,.25);
      background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
    }
    #type-input {
      flex: 1; min-width: 0; height: 40px; border-radius: 999px;
      border: 1px solid rgba(148,163,184,.45); outline: none;
      padding: 0 13px; font-size: 14px; color: var(--ink); background: white;
    }
    #type-input:focus { border-color: rgba(59,130,246,.7); box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    #btn-send {
      width: 44px; height: 40px; border: 0; border-radius: 999px; cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white; font-size: 18px; font-weight: 900;
      box-shadow: 0 6px 14px rgba(249,115,22,.25); flex: 0 0 auto;
    }
    .footer-actions { display: flex; gap: 6px; padding: 0 10px 10px; background: rgba(255,255,255,.85); }
    .footer-actions a {
      flex: 1; text-align: center; text-decoration: none; border-radius: 999px;
      padding: 8px 9px; font-size: 12px; font-weight: 900;
    }
    .phone { background: var(--brand); color: #fff; }
    .line { background: #06C755; color: #fff; }
    @media (max-width: 360px) {
      .brand-title { font-size: 16px; }
      .brand-sub { font-size: 11px; }
      .msg { font-size: 13px; }
      .sugg { font-size: 11px; padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <section id="widget" aria-label="租必達 AI 助理">
    <header class="topbar">
      <button id="btn-close" type="button" aria-label="收合助理">×</button>
      <div class="brand-row">
        <div class="avatar-mark" aria-hidden="true">租</div>
        <div>
          <div class="brand-title">租必達 AI 助理</div>
          <div class="brand-sub">水冷扇｜活動帳篷｜發電機，先幫您快速整理方向</div>
        </div>
      </div>
    </header>

    <main id="chat" class="chat" aria-live="polite"></main>

    <div id="suggestions" class="suggestions"></div>

    <div class="inputbar">
      <input id="type-input" type="text" maxlength="200" placeholder="輸入租賃設備問題..." aria-label="輸入設備諮詢">
      <button id="btn-send" type="button" aria-label="送出問題">➤</button>
    </div>

    <div class="footer-actions">
      <a class="phone" href="tel:0920633116" target="_parent">直接來電</a>
      <a class="line" href="https://lin.ee/XM7224r" target="_blank" rel="noopener">LINE 詢問</a>
    </div>
  </section>

  <script>
    (function () {
      'use strict';

      var CFG = new URLSearchParams(location.search);
      var KNOWLEDGE_URL = CFG.get('knowledge') || 'knowledge.js?v=202606-ai-fix';
      var WELCOME_TEXT = CFG.get('text') || '您好，我是租必達 AI 助理。您可以問我租金怎麼算、有哪些設備、水冷扇適合場景、發電機怎麼挑，或直接點下方快速問題。';

      var els = {
        chat: document.getElementById('chat'),
        suggestions: document.getElementById('suggestions'),
        input: document.getElementById('type-input'),
        send: document.getElementById('btn-send'),
        close: document.getElementById('btn-close')
      };

      var defaultSuggestions = [
        '請問租金怎麼算？',
        '有出租哪些設備？',
        '水冷扇適合用在什麼地方？',
        '發電機型號怎麼挑？',
        '可以自載自搭嗎？'
      ];

      function normalize(text) {
        return String(text || '').toLowerCase().replace(/[？?，,。！!\s]+/g, '');
      }

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>"']/g, function (ch) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
        });
      }

      function addMessage(role, text) {
        var div = document.createElement('div');
        div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
        div.innerHTML = escapeHtml(text);
        els.chat.appendChild(div);
        els.chat.scrollTop = els.chat.scrollHeight;
      }

      function getKeywords(item) {
        var result = [];
        if (item.q) result.push(item.q);
        if (item.kw) {
          String(item.kw).split(/\s+/).forEach(function (kw) {
            if (kw) result.push(kw);
          });
        }
        return result;
      }

      function fallbackAnswer() {
        return '這個問題我先幫您記下來。租金、檔期、配送與設備數量會依活動地點、日期與現場條件不同，建議直接來電 0920-633-116 或加入 LINE，租必達會協助您快速評估。';
      }

      function findAnswer(question) {
        var qNorm = normalize(question);
        var kb = window.KB || [];

        for (var i = 0; i < kb.length; i += 1) {
          var item = kb[i] || {};
          var words = getKeywords(item);
          for (var j = 0; j < words.length; j += 1) {
            var kw = normalize(words[j]);
            if (!kw) continue;
            if (qNorm.indexOf(kw) !== -1 || kw.indexOf(qNorm) !== -1) {
              return item.a || fallbackAnswer();
            }
          }
        }
        return fallbackAnswer();
      }

      function handleQuestion(question) {
        var q = String(question || '').trim();
        if (!q) return;
        addMessage('user', q);
        window.setTimeout(function () {
          addMessage('bot', findAnswer(q));
        }, 420);
      }

      function initSuggestions() {
        els.suggestions.innerHTML = '<div class="sg-label">👋 我能為您解答：</div>';
        defaultSuggestions.forEach(function (text) {
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'sugg';
          btn.textContent = text;
          btn.addEventListener('click', function () { handleQuestion(text); });
          els.suggestions.appendChild(btn);
        });
      }

      function loadKnowledge(callback) {
        if (Array.isArray(window.KB)) {
          callback();
          return;
        }
        var script = document.createElement('script');
        script.src = KNOWLEDGE_URL;
        script.onload = function () { callback(); };
        script.onerror = function () {
          window.KB = [];
          callback();
          window.parent.postMessage({
            ns: 'avatar-widget',
            type: 'error',
            message: 'knowledge.js 載入失敗，已改用預設回覆。'
          }, '*');
        };
        document.head.appendChild(script);
      }

      function initWidget() {
        initSuggestions();
        addMessage('bot', WELCOME_TEXT);

        els.close.addEventListener('click', function () {
          window.parent.postMessage({ ns: 'avatar-widget', type: 'close' }, '*');
        });

        els.send.addEventListener('click', function () {
          var q = els.input.value.trim();
          els.input.value = '';
          handleQuestion(q);
          els.input.focus();
        });

        els.input.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' && !event.isComposing) {
            event.preventDefault();
            els.send.click();
          }
        });

        window.addEventListener('message', function (event) {
          var data = event.data || {};
          if (data.ns !== 'avatar-widget-host') return;
          if (data.type === 'say') addMessage('bot', String(data.text || ''));
        });

        window.parent.postMessage({ ns: 'avatar-widget', type: 'ready' }, '*');
      }

      loadKnowledge(initWidget);
    })();
  </script>
</body>
</html>
